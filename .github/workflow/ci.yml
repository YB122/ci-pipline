name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:


jobs:
  test:
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo
        ports:
          - 27017:27017
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "18"

      - name: Install dependencies
        run: npm install

      - name: Run unit tests
        run: npm run test

      - name: Start Server
        run: npm run start

      - name: Wait for server
        run: sleep 5
